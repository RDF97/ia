name: Build TPV Evento APK

on:
  push:
    paths:
      - "tpv-evento/**"
      - ".github/workflows/build-tpv-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      # Signing: uses the TPV_KEYSTORE_B64 secret if configured (stable key,
      # in-place updates); otherwise generates a throwaway key for this build.
      - name: Prepare signing key
        working-directory: tpv-evento
        env:
          KEYSTORE_B64: ${{ secrets.TPV_KEYSTORE_B64 }}
        run: |
          mkdir -p keystore
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore/release.keystore
          else
            keytool -genkeypair -keystore keystore/release.keystore -alias tpv \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass tpvevento -keypass tpvevento -dname "CN=TPV Evento"
          fi

      - name: Build release APK
        working-directory: tpv-evento
        env:
          TPV_KEYSTORE_PASSWORD: ${{ secrets.TPV_KEYSTORE_PASSWORD || 'tpvevento' }}
          TPV_KEY_ALIAS: ${{ secrets.TPV_KEY_ALIAS || 'tpv' }}
          TPV_KEY_PASSWORD: ${{ secrets.TPV_KEY_PASSWORD || 'tpvevento' }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp tpv-evento/app/build/outputs/apk/release/app-release.apk tpv-evento.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpv-evento-apk
          path: tpv-evento.apk

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tpv-evento-latest
          name: "TPV Evento — última versión"
          body: |
            APK de TPV Evento generado automáticamente a partir del último cambio.

            **Instalación:** descarga `tpv-evento.apk` en la tablet, ábrelo y acepta
            la instalación de orígenes desconocidos.
          files: tpv-evento.apk
